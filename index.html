<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Eventos</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1c1c1c;
    --border: #2e2e2e;
    --accent: #c8f135;
    --text: #f0f0f0;
    --muted: #777;
    --danger: #ff5c5c;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
  }

  .wrap {
    width: 100%;
    max-width: 580px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 30px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .dot {
    width: 11px; height: 11px;
    background: var(--accent);
    border-radius: 50%;
    flex-shrink: 0;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:.4;transform:scale(.8);}
  }

  h1 { font-family:'Syne',sans-serif; font-weight:800; font-size:1.5rem; letter-spacing:-.5px; }
  h1 span { color: var(--accent); }

  .tabs { display:flex; gap:10px; margin-bottom:16px; }

  .tab {
    flex:1; padding:14px 10px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--muted);
    font-family:'DM Sans',sans-serif; font-size:1rem; font-weight:600;
    cursor:pointer; text-align:center; transition:all .2s;
  }
  .tab.active { background:var(--accent); border-color:var(--accent); color:#0f0f0f; }

  textarea {
    width:100%; min-height:150px;
    background:var(--surface); border:1px solid var(--border);
    border-radius:var(--radius); color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:1rem;
    padding:16px; resize:none; outline:none; line-height:1.6;
    transition:border-color .2s;
  }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--muted); }

  .img-upload {
    display:none; width:100%; min-height:160px;
    background:var(--surface); border:2px dashed var(--border);
    border-radius:var(--radius); cursor:pointer;
    align-items:center; justify-content:center;
    flex-direction:column; gap:10px;
    position:relative; transition:all .2s;
  }
  .img-upload.on { display:flex; }
  .img-upload:hover, .img-upload.drag { border-color:var(--accent); background:rgba(200,241,53,.05); }
  .img-upload input { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .img-upload .ico { font-size:2.4rem; }
  .img-upload p { color:var(--muted); font-size:.95rem; text-align:center; line-height:1.5; }

  .paste-hint {
    display:none; margin-top:10px; padding:10px 14px;
    background:rgba(200,241,53,.07); border:1px dashed rgba(200,241,53,.25);
    border-radius:10px; color:var(--muted); font-size:.85rem; text-align:center;
  }
  .paste-hint.on { display:block; }

  #previewImg {
    display:none; width:100%; border-radius:var(--radius);
    max-height:220px; object-fit:cover; margin-top:4px;
  }

  .analyze-btn {
    width:100%; margin-top:14px; padding:18px;
    background:var(--accent); color:#0f0f0f;
    border:none; border-radius:var(--radius);
    font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800;
    cursor:pointer; letter-spacing:.3px; transition:all .2s;
  }
  .analyze-btn:hover { background:#d4ff45; }
  .analyze-btn:disabled { background:#222; color:var(--muted); cursor:not-allowed; }

  .loading { display:none; text-align:center; padding:40px 20px; color:var(--muted); }
  .loading.on { display:block; }
  .spinner {
    width:34px; height:34px; border:3px solid var(--border);
    border-top-color:var(--accent); border-radius:50%;
    animation:spin .8s linear infinite; margin:0 auto 14px;
  }
  @keyframes spin { to{transform:rotate(360deg);} }

  .form-sec { display:none; }
  .form-sec.on { display:block; animation:up .3s ease; }
  @keyframes up { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }

  .form-hdr { display:flex; align-items:center; gap:10px; margin-bottom:20px; }
  .form-hdr h2 { font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; }
  .badge { background:var(--accent); color:#0f0f0f; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:800; font-family:'Syne',sans-serif; }

  .field { margin-bottom:14px; }
  label { display:block; font-size:.75rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:7px; }

  input, select {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:12px; color:var(--text);
    font-family:'DM Sans',sans-serif; font-size:1rem;
    padding:14px 16px; outline:none; transition:border-color .2s;
    -webkit-appearance:none;
  }
  input:focus, select:focus { border-color:var(--accent); }
  select option { background:#1c1c1c; }

  .row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

  .actions { display:flex; gap:12px; margin-top:24px; }

  .btn-save {
    flex:2; padding:18px; background:var(--accent); color:#0f0f0f;
    border:none; border-radius:var(--radius);
    font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800;
    cursor:pointer; transition:all .2s;
  }
  .btn-save:hover { background:#d4ff45; }
  .btn-save:disabled { background:#222; color:var(--muted); cursor:not-allowed; }

  .btn-cancel {
    flex:1; padding:18px; background:transparent; color:var(--muted);
    border:1px solid var(--border); border-radius:var(--radius);
    font-family:'DM Sans',sans-serif; font-size:1rem; cursor:pointer; transition:all .2s;
  }
  .btn-cancel:hover { border-color:var(--muted); color:var(--text); }

  .err {
    display:none; color:var(--danger); font-size:.9rem; margin-top:10px;
    padding:12px 14px; background:rgba(255,92,92,.08);
    border-radius:10px; border:1px solid rgba(255,92,92,.2);
  }
  .err.on { display:block; }

  .toast {
    position:fixed; bottom:28px; left:50%;
    transform:translateX(-50%) translateY(120px);
    background:#1c1c1c; color:var(--text); padding:14px 24px;
    border-radius:30px; font-size:.95rem; font-weight:500;
    border:1px solid var(--border); transition:transform .3s ease;
    z-index:999; white-space:nowrap;
  }
  .toast.on { transform:translateX(-50%) translateY(0); }
  .toast.ok { border-color:var(--accent); }
  .toast.bad { border-color:var(--danger); }

  @media (max-width: 480px) {
    .wrap { padding: 24px 16px 80px; }
    h1 { font-size: 1.3rem; }
    .row { grid-template-columns: 1fr; gap: 0; }
    .actions { flex-direction: column-reverse; }
    .btn-save, .btn-cancel { flex: unset; width: 100%; }
    .paste-hint { display: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="dot"></div>
    <h1>Mis <span>Eventos</span></h1>
  </header>

  <div id="inputSec">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('text')">📝 Texto</button>
      <button class="tab" onclick="switchTab('image')">🖼️ Imagen</button>
    </div>

    <textarea id="textInput" placeholder="Pega aquí el texto del evento... caption de Instagram, WhatsApp, Facebook, lo que sea."></textarea>

    <div class="img-upload" id="imgUpload">
      <span class="ico">📷</span>
      <p>Toca para elegir imagen<br><small>flyer, captura, screenshot</small></p>
      <input type="file" accept="image/*" id="fileInput" onchange="handleFile(this)">
    </div>

    <div class="paste-hint on" id="pasteHint">
      ⌨️ <strong>Ctrl+V</strong> para pegar desde ShareX
    </div>

    <img id="previewImg" alt="">
    <div class="err" id="errMsg"></div>
    <button class="analyze-btn" id="analyzeBtn" onclick="analyze()">✨ Analizar evento</button>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Analizando con IA...</p>
  </div>

  <div class="form-sec" id="formSec">
    <div class="form-hdr">
      <h2>Verifica los datos</h2>
      <span class="badge">IA</span>
    </div>

    <div class="field"><label>Título</label><input type="text" id="f_titulo" placeholder="Nombre del evento"></div>
    <div class="field"><label>Lugar</label><input type="text" id="f_lugar" placeholder="Dirección o lugar"></div>

    <div class="row">
      <div class="field"><label>Fecha inicio</label><input type="text" id="f_fecha_inicio" placeholder="DD/MM/YYYY"></div>
      <div class="field"><label>Fecha fin</label><input type="text" id="f_fecha_fin" placeholder="DD/MM/YYYY"></div>
    </div>
    <div class="row">
      <div class="field"><label>Horario</label><input type="text" id="f_horario" placeholder="Ej: 6PM - 9PM"></div>
      <div class="field">
        <label>Categoría</label>
        <select id="f_categoria">
          <option value="">-- Categoría --</option>
          <option>Feria</option><option>Concierto</option><option>Festival</option>
          <option>Cultural</option><option>Gastronómico</option><option>Arte</option>
          <option>Deportivo</option><option>Mercado</option><option>Otro</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>Fuente</label>
        <select id="f_fuente">
          <option value="">-- Fuente --</option>
          <option>Instagram</option><option>Facebook</option><option>TikTok</option>
          <option>Web</option><option>Otros</option>
        </select>
      </div>
      <div class="field"><label>Link (opcional)</label><input type="text" id="f_link" placeholder="https://..."></div>
    </div>

    <div class="err" id="errMsg2"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="reset()">Cancelar</button>
      <button class="btn-save" id="saveBtn" onclick="saveEvent()">💾 Guardar</button>
    </div>
  </div>

</div>
<div class="toast" id="toast"></div>

<script>
  // ⚠️ CAMBIA ESTA URL por la de tu Apps Script después de re-implementar
  const API_URL = 'PEGA_AQUI_TU_URL_DE_APPS_SCRIPT';

  var tab = 'text', b64 = null, mime = null;

  function switchTab(t) {
    tab = t;
    document.querySelectorAll('.tab').forEach(function(el,i){
      el.classList.toggle('active',(i===0&&t==='text')||(i===1&&t==='image'));
    });
    document.getElementById('textInput').style.display = t==='text'?'block':'none';
    document.getElementById('imgUpload').classList.toggle('on', t==='image');
    document.getElementById('pasteHint').classList.toggle('on', t==='image');
    if(t==='text') document.getElementById('previewImg').style.display='none';
  }

  function loadImg(file) {
    if(!file||!file.type.startsWith('image/')) return;
    mime = file.type;
    var r = new FileReader();
    r.onload = function(e){
      b64 = e.target.result.split(',')[1];
      var p = document.getElementById('previewImg');
      p.src=e.target.result; p.style.display='block';
      document.getElementById('imgUpload').style.minHeight='auto';
      document.getElementById('pasteHint').style.display='none';
    };
    r.readAsDataURL(file);
  }

  function handleFile(i){ loadImg(i.files[0]); }

  var uz = document.getElementById('imgUpload');
  uz.addEventListener('dragover',function(e){e.preventDefault();uz.classList.add('drag');});
  uz.addEventListener('dragleave',function(){uz.classList.remove('drag');});
  uz.addEventListener('drop',function(e){e.preventDefault();uz.classList.remove('drag');if(e.dataTransfer.files[0])loadImg(e.dataTransfer.files[0]);});

  document.addEventListener('paste',function(e){
    if(tab!=='image') return;
    var items=(e.clipboardData||{}).items||[];
    for(var i=0;i<items.length;i++){
      if(items[i].type.startsWith('image/')){loadImg(items[i].getAsFile());break;}
    }
  });

  function showErr(msg,id){var el=document.getElementById(id||'errMsg');el.textContent=msg;el.classList.add('on');}
  function hideErr(id){document.getElementById(id||'errMsg').classList.remove('on');}

  async function analyze(){
    hideErr('errMsg'); hideErr('errMsg2');
    var text=document.getElementById('textInput').value.trim();
    if(tab==='text'&&!text){showErr('Pega el texto del evento primero.');return;}
    if(tab==='image'&&!b64){showErr('Sube una imagen primero.');return;}

    document.getElementById('analyzeBtn').disabled=true;
    document.getElementById('loading').classList.add('on');
    document.getElementById('inputSec').style.opacity='.4';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'analyze',
          text: tab==='text'?text:null,
          image: tab==='image'?b64:null,
          mime: mime
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      fillForm(data);
    } catch(err) {
      document.getElementById('loading').classList.remove('on');
      document.getElementById('inputSec').style.opacity='1';
      document.getElementById('analyzeBtn').disabled=false;
      showErr('Error: '+err.message);
    }
  }

  function fillForm(d){
    document.getElementById('loading').classList.remove('on');
    document.getElementById('inputSec').style.opacity='1';
    document.getElementById('analyzeBtn').disabled=false;
    document.getElementById('f_titulo').value=d.titulo||'';
    document.getElementById('f_lugar').value=d.lugar||'';
    document.getElementById('f_fecha_inicio').value=d.fecha_inicio||'';
    document.getElementById('f_fecha_fin').value=d.fecha_fin||'';
    document.getElementById('f_horario').value=d.horario||'';
    document.getElementById('f_link').value=d.link||'';
    setSel('f_categoria',d.categoria);
    setSel('f_fuente',d.fuente);
    document.getElementById('formSec').classList.add('on');
    document.getElementById('formSec').scrollIntoView({behavior:'smooth'});
  }

  function setSel(id,val){
    var s=document.getElementById(id);
    for(var i=0;i<s.options.length;i++) if(s.options[i].text===val){s.selectedIndex=i;return;}
  }

  async function saveEvent(){
    var titulo=document.getElementById('f_titulo').value.trim();
    if(!titulo){showErr('El título es obligatorio.','errMsg2');return;}
    var btn=document.getElementById('saveBtn');
    btn.disabled=true; btn.textContent='Guardando...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'save',
          data: {
            titulo:document.getElementById('f_titulo').value,
            lugar:document.getElementById('f_lugar').value,
            fecha_inicio:document.getElementById('f_fecha_inicio').value,
            fecha_fin:document.getElementById('f_fecha_fin').value,
            horario:document.getElementById('f_horario').value,
            categoria:document.getElementById('f_categoria').value,
            fuente:document.getElementById('f_fuente').value,
            link:document.getElementById('f_link').value,
          }
        })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      toast('✅ Evento guardado','ok');
      setTimeout(reset, 1800);
    } catch(err) {
      btn.disabled=false; btn.textContent='💾 Guardar';
      showErr('Error: '+err.message,'errMsg2');
    }
  }

  function reset(){
    document.getElementById('textInput').value='';
    document.getElementById('fileInput').value='';
    document.getElementById('previewImg').style.display='none';
    b64=null; mime=null;
    document.getElementById('formSec').classList.remove('on');
    document.getElementById('loading').classList.remove('on');
    document.getElementById('inputSec').style.opacity='1';
    document.getElementById('analyzeBtn').disabled=false;
    document.getElementById('saveBtn').disabled=false;
    document.getElementById('saveBtn').textContent='💾 Guardar';
    hideErr('errMsg'); hideErr('errMsg2');
    switchTab('text');
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function toast(msg,type){
    var t=document.getElementById('toast');
    t.textContent=msg; t.className='toast '+type+' on';
    setTimeout(function(){t.className='toast';},3000);
  }
</script>
</body>
</html>
